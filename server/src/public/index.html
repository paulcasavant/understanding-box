<html>
    <head>
        <title>Understanding Box</title>
    </head>
    <body>
        <h1 id='title'>The page title</h1>
        <script>
            const ws = new WebSocket("ws://localhost:8080");
        
            ws.onopen = function(event) {
                console.log('[Webpage] Connected');
                ws.send("identity_webpage");
            };

            ws.onmessage = function(event) {
                document.getElementById('title').innerHTML = event.data;
            }
        </script>
    </body>
</html>
